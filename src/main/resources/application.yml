spring:
  application.name: OVY_Mq
  config:
    import: classpath:credential.yml
  server:
    port: 9090
  redis:
    host: localhost
    port: 6379

ovymq:
  task:
    consumer:
      active: false
      delay: 5000
    topic:
      active: true
      delay: 5000
    reprocessing:
      active: true
      delay: 600000
